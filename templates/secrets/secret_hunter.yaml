id: secret-hunter
info:
  name: Sensitive File & Identity Leak Detector
  author: FerzDevZ
  severity: critical
  description: Detection for sensitive files containing credentials, keys, and cloud configurations.

requests:
  - method: GET
    path:
      - "/.git/config"
      - "/.aws/credentials"
      - "/.aws/config"
      - "/.ssh/id_rsa"
      - "/.ssh/id_ed25519"
      - "/.env.bak"
      - "/.env.old"
      - "/web.config"
      - "/docker-compose.yml"
      - "/auth.json"
    matchers:
      - type: regex
        part: body
        regex:
          - "repositoryformatversion"
          - "aws_access_key_id"
          - "-----BEGIN RSA PRIVATE KEY-----"
          - "-----BEGIN OPENSSH PRIVATE KEY-----"
          - "DB_PASSWORD"
          - "DB_HOST"
        condition: or
