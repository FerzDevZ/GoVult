id: env-disclosure
info:
  name: Environment Variables Disclosure (.env)
  author: FerzDevZ
  severity: critical
  description: Detects exposed .env files containing sensitive configuration.
requests:
  - method: GET
    path:
      - "/.env"
      - "/.env.local"
      - "/.env.production"
    matchers:
      - type: word
        part: body
        condition: or
        words:
          - "DB_PASSWORD="
          - "APP_KEY="
          - "AWS_SECRET_ACCESS_KEY="
          - "STRIPE_SECRET="
          - "MAIL_PASSWORD="
---
id: git-config-disclosure
info:
  name: Git Configuration Disclosure (.git/config)
  author: FerzDevZ
  severity: critical
  description: Detects exposed .git/config which can reveal repository secrets.
requests:
  - method: GET
    path:
      - "/.git/config"
    matchers:
      - type: word
        part: body
        condition: or
        words:
          - "[core]"
          - "[remote"
          - "url ="
          - "fetch ="
---
id: backup-files-disclosure
info:
  name: Backup Files Disclosure (.bak, .old)
  author: FerzDevZ
  severity: high
  description: Detects exposed backup files which may contain sensitive code or configuration.
requests:
  - method: GET
    path:
      - "/config.php.bak"
      - "/config.php.old"
      - "/web.config.bak"
      - "/settings.py.bak"
    matchers:
      - type: word
        part: body
        condition: or
        words:
          - "<?php"
          - "<?="
          - "<configuration>"
          - "DATABASES ="
