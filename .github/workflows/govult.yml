name: GoVult Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Build GoVult
      run: go build -o govult ./cmd/scanner/main.go

    - name: Run GoVult (Self-Scan or Target)
      run: ./govult -u https://example.com --full -rl 5 -o scan-results.html

    - name: Archive Production Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: govult-report
        path: scan-results.html
